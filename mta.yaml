_schema-version: 3.3.0
ID: playground-cap-v1
description: A simple CAP project.
version: 1.0.0
modules:
- name: playground-cap-v1-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: playground-cap-v1-auth
  - name: playground-cap-v1-db
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: playground-cap-v1-db-deployer
  type: hdb
  path: db
  requires:
  - name: playground-cap-v1-db
  parameters:
    buildpack: nodejs_buildpack
- name: playground-cap-v1-destination-content
  type: com.sap.application.content
  requires:
  - name: playground-cap-v1-destination-service
    parameters:
      content-target: true
  - name: playground-cap-v1_html_repo_host
    parameters:
      service-key:
        name: playground-cap-v1_html_repo_host-key
  - name: playground-cap-v1-auth
    parameters:
      service-key:
        name: playground-cap-v1-auth-key
  parameters:
    content:
      instance:
        destinations:
        - Name: PlayGroundAppRouter_playground_cap_v1_html_repo_host
          ServiceInstanceName: playground-cap-v1-html5-app-host-service
          ServiceKeyName: playground-cap-v1_html_repo_host-key
          sap.cloud.service: PlayGroundAppRouter
        - Authentication: OAuth2UserTokenExchange
          Name: PlayGroundAppRouter_playground_cap_v1_auth
          ServiceInstanceName: playground-cap-v1-auth
          ServiceKeyName: playground-cap-v1-auth-key
          sap.cloud.service: PlayGroundAppRouter
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: playground-cap-v1-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: playground-cap-v1_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - employeesroster.zip
      name: employeesroster
      target-path: resources/
- name: employeesroster
  type: html5
  path: app/employees-roster
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: playground-cap-v1-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
      tenant-mode: dedicated
      xsappname: playground-cap-v1-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
- name: playground-cap-v1-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: playground-cap-v1-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: playground-cap-v1-destination-service
    service-plan: lite
  requires:
  - name: srv-api
- name: playground-cap-v1_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: playground-cap-v1-html5-app-host-service
    service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
